<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ROAVR Field">
<meta name="theme-color" content="#0a0e0b">
<title>ROAVR Field Mapper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e0b;--surface:#111815;--surface2:#182220;--surface3:#1e2c28;
  --border:#253430;--border2:#2e4040;
  --accent:#4ade80;--accent2:#22c55e;--accent-dim:rgba(74,222,128,0.12);--accent-glow:rgba(74,222,128,0.35);
  --text:#e2f0e0;--text2:#7a9e8e;--text3:#456055;
  --red:#f87171;--blue:#60a5fa;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg)}
body{display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);
  /* Safe area insets for iPhone notch/home bar */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);}
.app{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
.nav{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--border);z-index:50}
.nav-brand .b1{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--accent2);text-transform:uppercase}
.nav-brand .b2{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.4px;line-height:1.1}
.icon-btn{width:34px;height:34px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}
.icon-btn:active{transform:scale(0.9)}
.pages{flex:1;position:relative;overflow:hidden;min-height:0;display:flex;flex-direction:column}
.page{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(0.4,0,0.2,1),opacity .3s}
.page.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.map-wrapper{flex:1;position:relative;overflow:hidden;background:var(--bg)}

/* ── MAP ── */
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.bm-toggle{display:flex;background:rgba(10,14,11,0.93);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.map-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.map-chip:active{transform:scale(0.95)}
.map-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent-glow)}
.map-chip .num{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.map-chip .lbl{font-size:11px;color:var(--text2)}
.bm-btn{padding:7px 13px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.bm-btn.on{background:var(--accent-dim);color:var(--accent)}
.bm-sep{width:1px;background:var(--border)}
.gps-fab-inline{width:34px;height:34px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s}
.gps-fab-inline:active{transform:scale(0.9)}
.gps-fab-inline.on{background:var(--accent-dim);border-color:var(--accent)}
.place-strip{flex-shrink:0;display:flex;gap:8px;padding:10px 14px 12px;background:var(--bg);border-top:1px solid var(--border)}
.place-btn{flex:1;height:50px;border-radius:16px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.place-btn:active{transform:scale(0.96)}
.pb-gps{background:var(--accent);color:#061a0e}
.pb-map{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.tap-overlay{position:absolute;inset:0;z-index:25;cursor:crosshair;display:none}
.tap-overlay.on{display:block}
.tap-hint-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);padding:10px 18px;background:rgba(10,14,11,0.96);border:1px solid var(--accent);border-radius:22px;font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;pointer-events:none}
.cancel-tap{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:8px 18px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.4);border-radius:18px;font-size:12px;font-weight:600;color:var(--red);pointer-events:all;cursor:pointer;white-space:nowrap}

/* ── PICKER ── */
.picker-page{background:var(--surface)}
.picker-header{flex-shrink:0;padding:16px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.picker-header h2{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.6px}
.close-picker{width:30px;height:30px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);flex-shrink:0}
.close-picker:active{transform:scale(0.9)}
.picker-badge{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:4px 10px;border-radius:9px;font-size:12px;font-weight:600}
.pb-gps-badge{background:rgba(74,222,128,0.1);color:var(--accent);border:1px solid rgba(74,222,128,0.25)}
.pb-map-badge{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.25)}
.gtabs{flex-shrink:0;display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.gtabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s;white-space:nowrap}
.gtab:active{transform:scale(0.94)}
.gtab.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(74,222,128,0.3)}
.feat-scroll{flex:1;overflow-y:auto;padding:0 14px 8px;scrollbar-width:none;min-height:0}
.feat-scroll::-webkit-scrollbar{display:none}
.fsec{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:12px 2px 6px}
.frow{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;cursor:pointer;border:1.5px solid transparent;margin-bottom:3px;transition:all .12s;background:var(--surface2)}
.frow:active{transform:scale(0.98)}
.frow.sel{background:var(--accent-dim);border-color:rgba(74,222,128,0.4)}
.fico{width:40px;height:40px;border-radius:11px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px}
.fico svg,.fico img{width:100%;height:100%}
.fico span{font-size:20px}
.flbl{flex:1;font-size:14px;font-weight:500;color:var(--text);line-height:1.2}
.fchk{width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#061a0e;opacity:0;transition:opacity .12s;flex-shrink:0}
.frow.sel .fchk{opacity:1}
.picker-foot{flex-shrink:0;padding:8px 14px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:8px}
.note-field{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;resize:none;height:52px;width:100%;transition:border-color .15s}
.note-field::placeholder{color:var(--text3)}
.note-field:focus{border-color:var(--accent)}
.confirm-btn{width:100%;height:52px;border-radius:16px;border:none;background:var(--accent);color:#061a0e;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.confirm-btn:active{transform:scale(0.97);background:var(--accent2)}
.confirm-btn:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed}

/* ── RECORDS ── */
.records-page{background:var(--bg)}
.rec-hdr{flex-shrink:0;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.rec-hdr h2{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.6px}
.rec-hdr p{font-size:13px;color:var(--text2);margin-top:2px}
.stats-strip{flex-shrink:0;display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stats-strip::-webkit-scrollbar{display:none}
.stat-box{flex-shrink:0;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:13px;text-align:center;min-width:70px}
.stat-num{font-size:22px;font-weight:700;color:var(--accent);font-family:var(--mono);line-height:1}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:3px;font-weight:500}
.rec-body{flex:1;overflow-y:auto;padding:0 14px 14px;scrollbar-width:none;min-height:0}
.rec-body::-webkit-scrollbar{display:none}
.rec-section{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:12px 2px 6px}
.grp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:13px;margin-bottom:6px}
.grp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.grp-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.grp-bar{flex-shrink:0;width:56px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.grp-fill{height:100%;border-radius:3px}
.grp-cnt{font-size:16px;font-weight:700;color:var(--text);font-family:var(--mono)}
.rec-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:13px;margin-bottom:6px}
.rico{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px}
.rico svg,.rico img{width:100%;height:100%}
.rico span{font-size:17px}
.rinfo{flex:1;min-width:0}
.rname{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmeta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.rnote{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{width:28px;height:28px;border-radius:9px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.del-btn:active{transform:scale(0.86)}
.export-strip{flex-shrink:0;padding:10px 14px 14px;border-top:1px solid var(--border);background:var(--bg)}
.export-btn{width:100%;height:50px;border-radius:16px;border:none;background:linear-gradient(135deg,#14532d,#22c55e);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.export-btn:active{transform:scale(0.97)}
.export-btn:disabled{background:var(--surface2);color:var(--text3)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;opacity:.45;padding:40px 0}
.empty-icon{font-size:44px}
.empty-txt{font-size:14px;font-weight:500;color:var(--text2);text-align:center;line-height:1.5}

/* ── Bottom tab bar ── */
.tabbar{flex-shrink:0;height:70px;display:flex;align-items:flex-start;padding-top:8px;background:var(--bg);border-top:1px solid var(--border);z-index:50}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0;transition:all .15s}
.tb:active{transform:scale(0.92)}
.tb-icon{font-size:22px;line-height:1;filter:grayscale(1);opacity:.3;transition:all .2s}
.tb-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.3px;transition:all .2s}
.tb.on .tb-icon{filter:none;opacity:1}
.tb.on .tb-label{color:var(--accent)}

/* ── Toast ── */
.toast{position:absolute;top:6px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:9px 16px;font-size:12px;font-weight:600;color:var(--text);z-index:300;opacity:0;transition:all .28s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:7px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok .ti{color:var(--accent)}
.toast.info .ti{color:var(--blue)}

/* Leaflet overrides */
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
.eco-pin{width:34px;height:34px;border-radius:50%;background:#fff;border:2.5px solid #22c55e;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5);overflow:hidden;padding:4px}
.eco-pin svg{width:100%;height:100%}
.eco-pin span{font-size:17px}
@keyframes pinPop{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.pin-pop{animation:pinPop .35s cubic-bezier(0.34,1.56,0.64,1)}
.gps-dot{width:13px;height:13px;background:#60a5fa;border-radius:50%;border:2px solid #fff;position:relative}
.gps-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;background:rgba(96,165,250,0.25);animation:gring 2s ease-out infinite}
@keyframes gring{0%{transform:scale(1);opacity:.7}100%{transform:scale(3.5);opacity:0}}
</style>
</head>
<body>
<div class="screen">
  <div class="app">
   <!-- Nav -->
   <div class="nav">
    <div class="nav-brand"><div class="b1">ROAVR</div><div class="b2">Field Mapper</div></div>
    <div class="icon-btn" onclick="doExport()" title="Export">⬆</div>
   </div>
   <!-- Pages -->
   <div class="pages">

    <!-- MAP PAGE -->
    <div class="page" id="pg-map">
     <!-- Controls bar — always visible above the map -->
     <div style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);z-index:30">
      <div class="map-chip" onclick="goTab('records')">
       <div class="dot"></div>
       <span class="num" id="mapCount">0</span>
       <span class="lbl">placed</span>
      </div>
      <div class="bm-toggle">
       <div class="bm-btn on" id="bm-street" onclick="setBasemap('street')">Map</div>
       <div class="bm-sep"></div>
       <div class="bm-btn" id="bm-sat" onclick="setBasemap('sat')">Satellite</div>
      </div>
      <div class="gps-fab-inline" id="gpsFab" onclick="panGPS()">📍</div>
     </div>
     <div class="map-wrapper" id="mapWrapper">
      <div id="map"></div>
      <div class="tap-overlay" id="tapOverlay" onclick="handleTap(event)">
       <div class="cancel-tap" onclick="cancelTap(event)">✕ Cancel</div>
       <div class="tap-hint-bar">Tap map to place feature</div>
      </div>
     </div>
     <div class="place-strip">
      <button class="place-btn pb-gps" onclick="openPicker('gps')">📍 Place Here</button>
      <button class="place-btn pb-map" onclick="openPicker('map')">✚ Place on Map</button>
     </div>
    </div>

    <!-- PICKER PAGE -->
    <div class="page hidden picker-page" id="pg-picker">
     <div class="picker-header">
      <div>
       <h2>Select Feature</h2>
       <div class="picker-badge" id="pickerBadge"></div>
      </div>
      <div class="close-picker" onclick="closePicker()">✕</div>
     </div>
     <div class="gtabs" id="groupTabs"></div>
     <div class="feat-scroll" id="featScroll"></div>
     <div class="picker-foot">
      <textarea class="note-field" id="noteField" placeholder="Optional note — species, count, behaviour…"></textarea>
      <button class="confirm-btn" id="confirmBtn" onclick="confirmPlace()" disabled>Select a feature above</button>
     </div>
    </div>

    <!-- RECORDS PAGE -->
    <div class="page hidden records-page" id="pg-records">
     <div class="rec-hdr">
      <h2>Survey Records</h2>
      <p id="recSub">Nothing recorded yet</p>
     </div>
     <div class="stats-strip" id="statsStrip"></div>
     <div class="rec-body" id="recBody"></div>
     <div class="export-strip">
      <button class="export-btn" id="exportBtn2" onclick="doExport()" disabled>⬆ Export GeoJSON</button>
     </div>
    </div>

   </div><!-- /pages -->

   <!-- Bottom tab bar -->
   <div class="tabbar">
    <div class="tb on" id="tb-map" onclick="goTab('map')">
     <span class="tb-icon">🗺</span><span class="tb-label">Map</span>
    </div>
    <div class="tb" id="tb-records" onclick="goTab('records')">
     <span class="tb-icon">📋</span><span class="tb-label">Records</span>
    </div>
   </div>

  </div><!-- /app -->
  <div class="toast" id="toast"><span class="ti"></span><span id="toastMsg"></span></div>
 </div>

<script>
const GROUPS=[
 {id:'species',label:'🐾 Species',color:'#a78bfa',groups:[
  {name:'Bats',items:['PRF','Roost Entry / Exit Point']},
  {name:'Birds',items:['Bird Nest (Active)','Bird Nest (Inactive)','Bird Pellets']},
  {name:'Mammals',items:['Badger','Deer','Fox','Hedgehog','Squirrel']},
  {name:'Amphibians',items:['Amphibian Eggs']},
  {name:'Invertebrates',items:['Stag Beetle']},
 ]},
 {id:'signs',label:'🔍 Signs',color:'#fb923c',groups:[
  {name:'Mammal Signs',items:['Badger Latrine','Deer Droppings','Fox Droppings']},
  {name:'Structures',items:['Badger Sett','Otter Holt','Water Vole Burrow','Rabbit Burrow']},
 ]},
 {id:'existing',label:'🌳 Existing',color:'#34d399',groups:[
  {name:'Water',items:['Water Body','GCN Pond','Kingfisher Bank']},
  {name:'Vegetation',items:['Veteran Tree','Tree Stump','Dead Wood','Log Pile','Brash Pile']},
  {name:'Reptiles',items:['Herptile Refuge','Reptile Hibernaculum']},
  {name:'Built',items:['Green Roof']},
 ]},
 {id:'bat',label:'🦇 Bat Survey',color:'#818cf8',groups:[
  {name:'Roost',items:['PRF','Roost Entry / Exit Point']},
  {name:'Equipment',items:['Static Bat Detector','Bat Box']},
  {name:'Survey',items:['Observer Station']},
 ]},
 {id:'enhance',label:'🏡 Enhancements',color:'#f472b6',groups:[
  {name:'Bats',items:['Bat Box']},
  {name:'Birds',items:['Bird Box','Swift Brick','Swift Box','Barn Owl Box','House Martin Cup']},
  {name:'Invertebrates',items:['Bee Brick','Bee Bank','Insect Box','Stag Beetle Loggery']},
  {name:'Mammals',items:['Wildlife Gap','Hedgehog House','Hedgehog Gap','Dormouse Box','Badger Gate']},
  {name:'Reptiles',items:['Herptile Refuge','Reptile Hibernaculum']},
 ]},
 {id:'survey',label:'📋 Survey',color:'#94a3b8',groups:[
  {name:'Site',items:['Building','Target Note','Observer Station']},
 ]},
];

function getIcon(name){return SVGS[name]?SVGS[name]:`<span>${EMOJIS[name]||'📍'}</span>`}

// State
let records=[],selFeat=null,pickMode='gps',pending=null,curTab='map',curGroup='species';
let map,streetL,satL,gpsMarker,markers=[];
let curLat=51.8842,curLng=-1.0820,gpsReady=false,watchId=null;

function sizeMap(){
  // Calculate available height: total window minus nav, controls bar, place strip, tabbar
  const nav = document.querySelector('.nav');
  const ctrlBar = document.querySelector('#pg-map > div:first-child');
  const placeStrip = document.querySelector('.place-strip');
  const tabbar = document.querySelector('.tabbar');
  const screen = document.querySelector('.screen');
  const usedH = (nav ? nav.offsetHeight : 52)
              + (ctrlBar ? ctrlBar.offsetHeight : 44)
              + (placeStrip ? placeStrip.offsetHeight : 72)
              + (tabbar ? tabbar.offsetHeight : 70);
  const availH = window.innerHeight - usedH;
  const wrapper = document.getElementById('mapWrapper');
  const mapEl = document.getElementById('map');
  const w = window.innerWidth;
  const h = Math.max(availH, 200);
  wrapper.style.height = h + 'px';
  mapEl.style.width = w + 'px';
  mapEl.style.height = h + 'px';
  return {w, h};
}

function initMap(){
  const {w, h} = sizeMap();
  map=L.map('map',{center:[curLat,curLng],zoom:5,zoomControl:false,attributionControl:false});
  streetL=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
  satL=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
  streetL.addTo(map);
  gpsMarker=L.marker([curLat,curLng],{icon:L.divIcon({html:'<div class="gps-dot"></div>',className:'',iconSize:[13,13],iconAnchor:[6,6]})}).addTo(map);
  setTimeout(()=>{ sizeMap(); map.invalidateSize(true); }, 300);
  setTimeout(()=>{ sizeMap(); map.invalidateSize(true); }, 800);
  window.addEventListener('resize', ()=>{ sizeMap(); map.invalidateSize(true); });
  startGPS();
}

function startGPS(){
  if(!navigator.geolocation){toast('info','GPS not available in this browser');return;}
  const fab=document.getElementById('gpsFab');
  fab.textContent='⏳';

  // One-shot first fix to pan the map immediately
  navigator.geolocation.getCurrentPosition(
    pos=>{
      curLat=pos.coords.latitude;curLng=pos.coords.longitude;gpsReady=true;
      gpsMarker.setLatLng([curLat,curLng]);
      map.flyTo([curLat,curLng],17,{duration:1.2});
      fab.textContent='📍';toast('ok','GPS locked');
    },
    err=>{fab.textContent='📍';toast('info','GPS: '+gpsErrMsg(err));},
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );

  // Continuous watch for moving dot
  watchId=navigator.geolocation.watchPosition(
    pos=>{
      curLat=pos.coords.latitude;curLng=pos.coords.longitude;gpsReady=true;
      gpsMarker.setLatLng([curLat,curLng]);
    },
    ()=>{},
    {enableHighAccuracy:true,maximumAge:5000}
  );
}

function gpsErrMsg(e){
  if(e.code===1)return'Permission denied — allow location in browser settings';
  if(e.code===2)return'Position unavailable';
  if(e.code===3)return'GPS timed out';
  return'Unknown error';
}

function panGPS(){
  const fab=document.getElementById('gpsFab');
  if(!gpsReady){toast('info','Waiting for GPS fix…');return;}
  map.flyTo([curLat,curLng],17,{duration:.7});
  fab.classList.add('on');setTimeout(()=>fab.classList.remove('on'),800);
}

function setBasemap(m){
  if(m==='sat'){map.removeLayer(streetL);satL.addTo(map);document.getElementById('bm-street').classList.remove('on');document.getElementById('bm-sat').classList.add('on');}
  else{map.removeLayer(satL);streetL.addTo(map);document.getElementById('bm-sat').classList.remove('on');document.getElementById('bm-street').classList.add('on');}
}

  ['map','records'].forEach(id=>{
    document.getElementById('pg-'+id).classList.toggle('hidden',id!==t);
    const tb=document.getElementById('tb-'+id);if(tb)tb.classList.toggle('on',id===t);
  });
  document.getElementById('pg-picker').classList.add('hidden');
  curTab=t;
  if(t==='records')renderRecords();

function openPicker(mode){
  pickMode=mode;selFeat=null;
  document.getElementById('noteField').value='';
  const btn=document.getElementById('confirmBtn');btn.disabled=true;btn.textContent='Select a feature above';
  const badge=document.getElementById('pickerBadge');
  if(mode==='gps'){badge.className='picker-badge pb-gps-badge';badge.textContent='📍 Placing at GPS location';}
  else{badge.className='picker-badge pb-map-badge';badge.textContent='🗺 Tap map after selecting';}
  curGroup='species';buildGroupTabs();buildFeatList();
  document.getElementById('pg-picker').classList.remove('hidden');
  document.getElementById('pg-map').classList.add('hidden');
  document.getElementById('pg-records').classList.add('hidden');
  ['map','records'].forEach(id=>{const tb=document.getElementById('tb-'+id);if(tb)tb.classList.remove('on');});
}

function closePicker(){
  document.getElementById('pg-picker').classList.add('hidden');
  document.getElementById('pg-map').classList.remove('hidden');
  document.getElementById('tb-map').classList.add('on');
  setTimeout(()=>{if(map){sizeMap();map.invalidateSize(true);}},50);
}

function buildGroupTabs(){
  const c=document.getElementById('groupTabs');c.innerHTML='';
  GROUPS.forEach(g=>{const d=document.createElement('div');d.className='gtab'+(g.id===curGroup?' on':'');d.textContent=g.label;d.onclick=()=>{curGroup=g.id;buildGroupTabs();buildFeatList();};c.appendChild(d);});
}

function buildFeatList(){
  const g=GROUPS.find(x=>x.id===curGroup);
  const c=document.getElementById('featScroll');c.innerHTML='';
  const seen=new Set();
  g.groups.forEach(sub=>{
    const sec=document.createElement('div');sec.className='fsec';sec.textContent=sub.name;c.appendChild(sec);
    sub.items.forEach(name=>{
      if(seen.has(name))return;seen.add(name);
      const row=document.createElement('div');row.className='frow'+(selFeat===name?' sel':'');
      row.innerHTML=`<div class="fico">${getIcon(name)}</div><div class="flbl">${name}</div><div class="fchk">✓</div>`;
      row.onclick=()=>{selFeat=name;const btn=document.getElementById('confirmBtn');btn.disabled=false;btn.textContent='Record: '+name;buildFeatList();};
      c.appendChild(row);
    });
  });
}

function confirmPlace(){
  if(!selFeat)return;
  const note=document.getElementById('noteField').value.trim();
  if(pickMode==='map'){
    pending={name:selFeat,note};
    document.getElementById('pg-picker').classList.add('hidden');
    document.getElementById('pg-map').classList.remove('hidden');
    document.getElementById('tapOverlay').classList.add('on');
    document.getElementById('tb-map').classList.add('on');
    setTimeout(()=>{if(map){sizeMap();map.invalidateSize(true);}},50);
    toast('info','Tap map to place: '+selFeat);
  } else {
    addRecord(selFeat,note,curLat,curLng);
    closePicker();
  }
}

function handleTap(e){
  if(!pending)return;
  if(e.target.closest('.cancel-tap'))return;
  const rect=document.getElementById('map').getBoundingClientRect();
  const pt=map.containerPointToLatLng([e.clientX-rect.left,e.clientY-rect.top]);
  addRecord(pending.name,pending.note,pt.lat,pt.lng);
  document.getElementById('tapOverlay').classList.remove('on');
  pending=null;
}
function cancelTap(e){e.stopPropagation();document.getElementById('tapOverlay').classList.remove('on');pending=null;toast('info','Cancelled');}

function addRecord(name,note,lat,lng){
  const id=Date.now();
  records.push({id,name,note,lat,lng,ts:new Date().toISOString()});
  const pin=L.divIcon({html:`<div class="eco-pin pin-pop">${getIcon(name)}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]});
  const mk=L.marker([lat,lng],{icon:pin}).addTo(map);
  mk.bindPopup(`<b>${name}</b>${note?'<br><i>'+note+'</i>':''}<br><small>${new Date().toLocaleTimeString()}</small>`);
  markers.push({id,mk});
  map.flyTo([lat,lng],Math.max(map.getZoom(),17),{duration:.6});
  document.getElementById('mapCount').textContent=records.length;
  toast('ok','Recorded: '+name);
}

function renderRecords(){
  const n=records.length;
  document.getElementById('recSub').textContent=n?`${n} feature${n!==1?'s':''} · ${new Date().toLocaleDateString('en-GB')}`:'Nothing recorded yet';
  const grouped={};GROUPS.forEach(g=>{grouped[g.label]=0;});
  records.forEach(r=>{const g=GROUPS.find(g=>g.groups.some(s=>s.items.includes(r.name)));if(g)grouped[g.label]=(grouped[g.label]||0)+1;});
  const active=Object.entries(grouped).filter(([,v])=>v>0);
  const strip=document.getElementById('statsStrip');strip.innerHTML='';
  const tb=document.createElement('div');tb.className='stat-box';tb.innerHTML=`<div class="stat-num">${n}</div><div class="stat-lbl">Total</div>`;strip.appendChild(tb);
  active.forEach(([lbl,cnt])=>{const b=document.createElement('div');b.className='stat-box';b.innerHTML=`<div class="stat-num">${cnt}</div><div class="stat-lbl">${lbl.split(' ').slice(1).join(' ')}</div>`;strip.appendChild(b);});
  const body=document.getElementById('recBody');body.innerHTML='';
  document.getElementById('exportBtn2').disabled=!n;
  if(!n){body.innerHTML='<div class="empty"><div class="empty-icon">🌿</div><div class="empty-txt">Start recording features on the map</div></div>';return;}
  const colors=['#a78bfa','#fb923c','#34d399','#818cf8','#f472b6','#94a3b8'];
  if(active.length){
    const sh=document.createElement('div');sh.className='rec-section';sh.textContent='by category';body.appendChild(sh);
    const maxV=Math.max(...active.map(([,v])=>v));
    active.forEach(([lbl,cnt],i)=>{
      const r=document.createElement('div');r.className='grp-row';const pct=maxV>0?Math.round(cnt/maxV*100):0;
      r.innerHTML=`<div class="grp-dot" style="background:${colors[i%colors.length]}"></div><div class="grp-name">${lbl}</div><div class="grp-bar"><div class="grp-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div><div class="grp-cnt">${cnt}</div>`;
      body.appendChild(r);
    });
  }
  const sh2=document.createElement('div');sh2.className='rec-section';sh2.textContent='all features';body.appendChild(sh2);
  [...records].reverse().forEach(r=>{
    const item=document.createElement('div');item.className='rec-item';
    const t=new Date(r.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    const coord=`${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}`;
    item.innerHTML=`<div class="rico">${getIcon(r.name)}</div><div class="rinfo"><div class="rname">${r.name}</div><div class="rmeta">${t} · ${coord}</div>${r.note?`<div class="rnote">${r.note}</div>`:''}</div><div class="del-btn" onclick="deleteRecord(${r.id})">✕</div>`;
    body.appendChild(item);
  });
}

function deleteRecord(id){
  records=records.filter(r=>r.id!==id);
  const m=markers.find(x=>x.id===id);if(m){map.removeLayer(m.mk);markers=markers.filter(x=>x.id!==id);}
  document.getElementById('mapCount').textContent=records.length;
  renderRecords();toast('info','Removed');
}

function doExport(){
  if(!records.length){toast('info','No features to export');return;}
  const gj={type:'FeatureCollection',name:'roavr_field_survey',crs:{type:'name',properties:{name:'urn:ogc:def:crs:OGC:1.3:CRS84'}},features:records.map(r=>({type:'Feature',properties:{feature_type:r.name,label:r.note||null,timestamp:r.ts,source:'roavr_field_mapper'},geometry:{type:'Point',coordinates:[r.lng,r.lat]}}))};
  const date=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(gj,null,2)],{type:'application/json'}));a.download=`roavr_field_${date}.geojson`;a.click();
  toast('ok','Exported GeoJSON');
}

function toast(type,msg){
  const el=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;
  el.querySelector('.ti').textContent=type==='ok'?'●':'○';el.className=`toast ${type} show`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

buildGroupTabs();buildFeatList();
// Defer map init until the DOM has painted and the map div has real dimensions
setTimeout(()=>{ initMap(); }, 100);
</script>
</body>
